- name: create ec2 instances and update R53 records
  become: yes
  hosts: local
  connection: local
  vars:
    instances:
    - mysql
    - frontend
    - backend
    SUBNET_ID: "subnet-0df0529713a89cb30"
    SG_ID: "sg-0612c2743325d86f2"
    IMAGE_ID: "ami-0220d79f3f480ecf5"
    ZONE_NAME: "daws-84s.bond"

  tasks:
  - name: create ec2 instances
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      vpc_subnet_id: "{{ SUBNET_ID }}"
      instance_type: "t3.micro"
      security_group: "{{ SG_ID }}"
      image_id: "{{ IMAGE_ID }}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: print ec2 output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"

  - name: create R53 record
    amazon.aws.route53:
      state: present
      zone: "{{ ZONE_NAME }}"
      record: "{{ item.item }}.{{ ZONE_NAME }}"
      ttl: 60
      type: A
      wait: true
      overwrite: true
      value: "{{ item.instances[0].private-ip-address }}"
    loop: "{{ ec2_output.results }}"
    when: "{{ item.item }} != frontend"

  - name: create R53 record
    amazon.aws.route53:
      state: present
      zone: "{{ ZONE_NAME }}"
      record: "{{ item.item }}.{{ ZONE_NAME }}"
      ttl: 60
      type: A
      wait: true
      overwrite: true
      value: "{{ item.instances[0].public-ip-address }}"
    loop: "{{ ec2_output.results }}"
    when: "{{ item.item }} == frontend"